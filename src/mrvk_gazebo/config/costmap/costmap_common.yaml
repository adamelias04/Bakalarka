transform_tolerance: 0.3

robot_radius: 0.50

obstacles:
  enabled: true
  footprint_clearing_enabled: true
  observation_sources: scan_marking scan_clearing

  scan_marking:
    data_type: LaserScan
    topic: /scan
    sensor_frame: sensor_laser_link
    marking: true
    clearing: false
    inf_is_valid: false
    obstacle_range: 3.4
    raytrace_range: 3.7

  scan_clearing:
    data_type: LaserScan
    topic: /scan
    sensor_frame: sensor_laser_link
    marking: false
    clearing: true
    inf_is_valid: true
    obstacle_range: 3.4
    raytrace_range: 7.0

  observation_persistence: 0.0
  expected_update_rate: 0.0

# Zapisuje lethal bunky pozdlz /predicted_obstacle_path priamo na master grid
# v updateCosts. Bez perzistencie — kazdy cyklus sa prekresli z aktualneho
# path, takze stare predikcie automaticky miznu (ziadne artefakty ako pri
# PointCloud -> ObstacleLayer). Cells v robot_exclusion_radiuse sa preskakuju.
predicted_path_obstacle_layer:
  enabled: true
  path_topic: /predicted_obstacle_path
  obstacle_radius: 0.25
  max_path_length: 3.0
  robot_exclusion_radius: 0.55
  path_staleness_tolerance: 0.5
  # Zamerne POD lethal_threshold (85) v robot_motion_predictor — cloud
  # ma sluzit TEB-u ako silne repulzivne pole, nie spustac pre
  # LETHAL_ESCAPE / runPrediction REVERSE. Cellula s cost=80 nevyvola
  # cellLethal() a nezablokuje kandidatov v selectHeadOnManeuver.
  cost_value: 80

predicted_sweep_risk_layer:
  enabled: true

  path_topic: /predicted_obstacle_path
  pose_topic: /detected_obstacle_pose
  visualization_topic: /predicted_sweep_safe_zone
  via_points_topic: /move_base/TebLocalPlannerROS/via_points
  via_points_marker_topic: /predicted_sweep_via_points

  corridor_half_width: 0.8
  side_extra_width: 0.30
  obstacle_radius: 0.22
  max_path_length: 2.0
  velocity_epsilon: 0.03
  pose_staleness_tolerance: 0.35
  pose_path_deviation_tolerance: 0.45
  visualization_z: 0.08
  visualization_height: 0.04
  visualization_clearance: 0.55
  rear_zone_length_scale: 2.25
  front_zone_length_scale: 1.0
  predicted_path_half_width: 0.8
  low_speed_hold_time: 0.8
  min_fallback_length: 1.0
  geometry_hold_time: 1.0
  via_points_hold_time: 3.0
  via_point_reached_distance: 0.55
  goal_reached_distance: 0.35
  rear_via_point_distance: 0.35
  # Kolko navyse (nad obstacle_radius) musi robot projekcne prejsť za
  # stredom prekazky pozdlz jej osi pohybu, kym sa via-point pre danu
  # tracking epizodu natrvalo zhasne. Prevencia wake-chasingu.
  bypass_handoff_distance: 0.15

  # Cost graduation: predikovana draha a telo prekazky su lethal
  # (global planner sa im musi vyhnut), stredna a bocne zony su iba
  # odpudive, aby TEB dokazal robota cez via-point pretlacit do safe zony.
  sweep_cost: 180
  side_cost: 110
  body_cost: 254
  path_cost: 180

  use_pose_as_start: true
  apply_costs: true
  prefer_rear_via_zone: true
  publish_visualization: true
  publish_via_points: true
  require_fresh_observation: true

inflation_layer:
  enabled: true
  inflation_radius: 0.3
  cost_scaling_factor: 2.5

obstacle_range: 3.4
raytrace_range: 3.7
