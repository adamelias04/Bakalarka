transform_tolerance: 0.3

robot_radius: 0.50

obstacles:
  enabled: true
  footprint_clearing_enabled: true
  observation_sources: scan_marking scan_clearing predicted_obstacles

  scan_marking:
    data_type: LaserScan
    topic: /scan
    sensor_frame: sensor_laser_link
    marking: true
    clearing: false
    inf_is_valid: false
    obstacle_range: 3.4
    raytrace_range: 3.7

  scan_clearing:
    data_type: LaserScan
    topic: /scan
    sensor_frame: sensor_laser_link
    marking: false
    clearing: true
    inf_is_valid: true
    obstacle_range: 3.4
    raytrace_range: 7.0

  predicted_obstacles:
    data_type: PointCloud
    topic: /predicted_obstacle_cloud
    marking: true
    clearing: false
    min_obstacle_height: 0.0
    max_obstacle_height: 2.0
    obstacle_range: 5.0
    raytrace_range: 5.5
    expected_update_rate: 0.0

  observation_persistence: 0.0
  expected_update_rate: 0.0

predicted_sweep_risk_layer:
  enabled: true

  path_topic: /predicted_obstacle_path
  pose_topic: /detected_obstacle_pose
  visualization_topic: /predicted_sweep_safe_zone

  corridor_half_width: 0.45
  side_extra_width: 0.30
  obstacle_radius: 0.22
  max_path_length: 2.40
  velocity_epsilon: 0.03
  pose_staleness_tolerance: 0.35
  pose_path_deviation_tolerance: 0.45
  visualization_z: 0.08
  visualization_height: 0.04
  visualization_clearance: 0.55
  rear_zone_length_scale: 1.5
  front_zone_length_scale: 1.0

  sweep_cost: 220
  side_cost: 150
  body_cost: 252

  use_pose_as_start: true
  publish_visualization: true
  require_fresh_observation: true

inflation_layer:
  enabled: true
  inflation_radius: 1.0
  cost_scaling_factor: 4.0

obstacle_range: 3.4
raytrace_range: 3.7
