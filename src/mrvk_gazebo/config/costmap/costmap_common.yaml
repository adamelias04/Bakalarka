transform_tolerance: 0.3

robot_radius: 0.50

obstacles:
  enabled: true
  footprint_clearing_enabled: true
  observation_sources: scan_marking scan_clearing predicted_obstacles

  scan_marking:
    data_type: LaserScan
    topic: /scan
    sensor_frame: sensor_laser_link
    marking: true
    clearing: false
    inf_is_valid: false
    obstacle_range: 3.4
    raytrace_range: 3.7

  scan_clearing:
    data_type: LaserScan
    topic: /scan
    sensor_frame: sensor_laser_link
    marking: false
    clearing: true
    inf_is_valid: true
    obstacle_range: 3.4
    raytrace_range: 3.7

  predicted_obstacles:
    data_type: PointCloud
    topic: /predicted_obstacle_cloud
    marking: true
    clearing: false
    min_obstacle_height: 0.0
    max_obstacle_height: 2.0
    obstacle_range: 5.0
    raytrace_range: 5.5
    expected_update_rate: 0.0

  observation_persistence: 0.0
  expected_update_rate: 0.0

inflation_layer:
  enabled: true
  inflation_radius: 1.0
  cost_scaling_factor: 4.0

obstacle_range: 3.4
raytrace_range: 3.7